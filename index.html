.bg-overlay {

  background: linear-gradient(180deg, rgba(2,8,20,0.3) 0%, rgba(2,8,20,0.5) 100%);
}

/* ===== SPLASH ===== */
#splash {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  transition: opacity 0.6s ease;
}
#splash.gone { opacity: 0; pointer-events: none; }

.sp-card {
  position: relative; width: 100%; max-width: 360px;
  border-radius: 24px;
  background: rgba(8,18,40,0.88);
  border: 1px solid rgba(120,160,255,0.25);
  box-shadow: 0 40px 100px rgba(0,0,10,0.9), 0 0 40px rgba(60,100,255,0.1);
  backdrop-filter: blur(20px);
  overflow: hidden;
  opacity: 0; transform: scale(0.9) translateY(20px);
  animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
}
@keyframes cardIn { to { opacity:1; transform:scale(1) translateY(0); } }

.sp-page { display: none; padding: 48px 28px 40px; text-align: center; }
.sp-page.on { display: block; }

/* ページ1 */
.sp-top-line {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, #60a5fa, transparent);
}
.sp-tag {
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 4px;
  color: rgba(96,165,250,0.6);
  text-transform: uppercase; margin-bottom: 32px;
}
.sp-headline {
  font-size: 24px; font-weight: 900;
  color: #ffffff; line-height: 1.6;
  margin-bottom: 40px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
.sp-headline em {
  font-style: normal;
  color: #93c5fd;
  display: block; font-size: 28px;
  text-shadow: 0 0 40px rgba(96,165,250,0.7);
}
.sp-btn {
  width: 100%; padding: 16px; border-radius: 14px; border: none;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
}
.sp-btn1 {
  background: rgba(96,165,250,0.12);
  color: #93c5fd;
  border: 1px solid rgba(96,165,250,0.3);
}
.sp-btn1:active { background: rgba(96,165,250,0.22); }

/* ページ2 */
.sp-top-line2 {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, #fbbf24, transparent);
}
.sp-body {
  font-size: 15px; color: rgba(255,255,255,0.85);
  line-height: 2; margin-bottom: 20px;
  font-weight: 500;
}
.sp-warn {
  background: rgba(251,191,36,0.1);
  border: 1px solid rgba(251,191,36,0.5);
  border-radius: 14px; padding: 18px 20px;
  font-size: 15px; font-weight: 700;
  color: #fde68a; line-height: 1.8;
  margin-bottom: 32px;
  text-shadow: 0 0 20px rgba(251,191,36,0.3);
}
.sp-btn2 {
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  color: #fff;
  box-shadow: 0 6px 24px rgba(59,130,246,0.4);
}
.sp-btn2:active { filter: brightness(0.9); }

.sp-dots {
  display: flex; justify-content: center; gap: 6px; margin-top: 18px;
}
.sp-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(255,255,255,0.15); transition: all 0.3s;
}
.sp-dot.on { background: rgba(255,255,255,0.6); width: 16px; border-radius: 3px; }

/* ===== 学習画面 ===== */
#app {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 28px 16px 60px;
  min-height: 100vh;
}

/* キャッチコピー */
.catchcopy {
  width: 100%; max-width: 440px;
  text-align: center; margin-bottom: 20px;
}
.catchcopy-main {
  font-size: 14px; font-weight: 700;
  color: rgba(255,255,255,0.7); line-height: 1.6;
}
.catchcopy-main em {
  font-style: normal; color: #60a5fa;
}
.catchcopy-sub {
  font-size: 11px; color: rgba(255,255,255,0.3);
  margin-top: 4px; line-height: 1.6;
}

/* 進捗 */
.progress-wrap {
  width: 100%; max-width: 440px;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 20px;
}
.progress-bar {
  flex: 1; height: 3px;
  background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 2px;
  transition: width 0.5s ease, background 0.4s;
}
.progress-text {
  font-family: 'Space Mono', monospace;
  font-size: 11px; color: rgba(255,255,255,0.35);
  min-width: 40px; text-align: right;
}

/* 動詞情報 */
.verb-row {
  width: 100%; max-width: 440px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 14px;
}
.verb-icon {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; flex-shrink: 0;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  transition: background 0.4s, border-color 0.4s;
}
.verb-info { flex: 1; }
.verb-name {
  font-size: 17px; font-weight: 700;
  color: #fff; margin-bottom: 6px;
}
.step-dots { display: flex; gap: 5px; }
.step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.12); transition: all 0.3s;
}
.step-dot.done { background: rgba(255,255,255,0.35); }
.step-dot.active { transform: scale(1.4); }
.verb-counter {
  font-family: 'Space Mono', monospace;
  font-size: 10px; color: rgba(255,255,255,0.3);
  margin-left: 8px; align-self: center;
}

/* メインカード */
.card-wrap { width: 100%; max-width: 440px; margin-bottom: 14px; }
.card {
  width: 100%; min-height: 200px; border-radius: 22px;
  padding: 30px 24px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; gap: 10px; cursor: pointer;
  background: rgba(10,20,45,0.75);
  border: 1.5px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(16px);
  transition: border-color 0.3s, box-shadow 0.3s, transform 0.1s;
  user-select: none;
}
.card:active { transform: scale(0.98); }
.card.revealed {
  border-color: rgba(100,160,255,0.5);
  box-shadow: 0 0 30px rgba(60,120,255,0.15);
}

.tense-tag {
  font-family: 'Space Mono', monospace;
  font-size: 10px; letter-spacing: 3px;
  padding: 4px 12px; border-radius: 50px;
  border: 1px solid currentColor; margin-bottom: 4px;
}
.card-ja {
  font-size: 15px; font-weight: 400;
  color: rgba(255,255,255,0.6); line-height: 1.5;
}
.card-en {
  font-size: clamp(18px, 5vw, 26px); font-weight: 800;
  line-height: 1.3; white-space: nowrap;
  display: none;
  letter-spacing: 0.3px;
}
.tap-hint {
  font-size: 11px; color: rgba(255,255,255,0.22);
  letter-spacing: 2px; margin-top: 4px;
}
.speak-row {
  display: none; align-items: center; margin-top: 4px;
}
.speak-btn {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.6); font-size: 15px;
  cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.2s;
}
.speak-btn.playing { opacity: 0.4; }

/* 次へボタン */
.btn-next {
  width: 100%; max-width: 440px; padding: 16px;
  border-radius: 14px; border: none;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; transition: all 0.3s;
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.25);
  margin-bottom: 10px;
}
.btn-next.ready { color: #000; }
.btn-next:disabled { cursor: not-allowed; }

/* BGMボタン */
.bgm-btn {
  width: 100%; max-width: 440px; padding: 13px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.4);
  font-family: 'Noto Sans JP', sans-serif; font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.bgm-btn.on { border-color: #4ade80; color: #4ade80; background: rgba(74,222,128,0.06); }

/* 完了 */
.complete {
  display: none; flex-direction: column;
  align-items: center; text-align: center;
  padding: 60px 20px; width: 100%;
}
.complete.show { display: flex; }
.complete-icon { font-size: 60px; margin-bottom: 16px; }
.complete-title {
  font-size: 28px; font-weight: 900;
  margin-bottom: 12px;
}
.complete-sub {
  font-size: 14px; color: rgba(255,255,255,0.45);
  line-height: 1.9;
}
.restart-btn {
  margin-top: 28px; padding: 14px 32px;
  border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
  background: transparent; color: #fff;
  font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
  cursor: pointer; transition: all 0.2s;
}
.restart-btn:hover { background: rgba(255,255,255,0.08); }

/* エフェクト */
@keyframes burst { 0%{opacity:1;transform:scale(0.2)} 100%{opacity:0;transform:scale(3)} }
@keyframes ring  { 0%{opacity:0.9;transform:scale(0.4)} 100%{opacity:0;transform:scale(2.5)} }
@keyframes slideUp { 0%{opacity:0;transform:translateY(14px)} 100%{opacity:1;transform:translateY(0)} }
.card.entering { animation: slideUp 0.3s ease-out; }
</style>
</head>

<script>

    { tense:'過去形', color:'#60a5fa', ja:'私は夕食を作りました。', en:'I cooked dinner.' },

    { tense:'疑問形', color:'#c084fc', ja:'あなたはテレビを見ますか？', en:'Do you watch TV?' },

    { tense:'否定形', color:'#f87171', ja:'私はコーヒーを飲みません。', en:"I don't drink coffee." },
    { tense:'疑問形', color:'#c084fc', ja:'あなたはコーヒーを飲みますか？', en:'Do you drink coffee?' },
  ]},
  { ja:'本を読む', icon:'📖', forms:[
    { tense:'現在形', color:'#4ade80', ja:'私は本を読みます。', en:'I read a book.', pronunciation:'I reed a book.' },
    { tense:'過去形', color:'#60a5fa', ja:'私は本を読みました。', en:'I read a book.', pronunciation:'I red a book.' },
    { tense:'未来形', color:'#fbbf24', ja:'私は本を読む予定です。', en:'I will read a book.' },

    { tense:'疑問形', color:'#c084fc', ja:'あなたは本を読みますか？', en:'Do you read books?' },

  { ja:'犬の散歩をする', icon:'🐕', forms:[

    { tense:'過去形', color:'#60a5fa', ja:'私は犬の散歩をしました。', en:'I walked my dog.' },

    { tense:'疑問形', color:'#c084fc', ja:'あなたは犬の散歩をしますか？', en:'Do you walk your dog?' },
  ]},
  { ja:'部屋を掃除する', icon:'🧹', forms:[
    { tense:'現在形', color:'#4ade80', ja:'私は部屋を掃除します。', en:'I clean my room.' },
    { tense:'過去形', color:'#60a5fa', ja:'私は部屋を掃除しました。', en:'I cleaned my room.' },
    { tense:'未来形', color:'#fbbf24', ja:'私は部屋を掃除する予定です。', en:'I will clean my room.' },
    { tense:'否定形', color:'#f87171', ja:'私は部屋を掃除しません。', en:"I don't clean my room." },

  ]},
  { ja:'音楽を聴く', icon:'🎵', forms:[
    { tense:'現在形', color:'#4ade80', ja:'私は音楽を聴きます。', en:'I listen to music.' },
    { tense:'過去形', color:'#60a5fa', ja:'私は音楽を聴きました。', en:'I listened to music.' },
    { tense:'未来形', color:'#fbbf24', ja:'私は音楽を聴く予定です。', en:'I will listen to music.' },
    { tense:'否定形', color:'#f87171', ja:'私は音楽を聴きません。', en:"I don't listen to music." },
    { tense:'疑問形', color:'#c084fc', ja:'あなたは音楽を聴きますか？', en:'Do you listen to music?' },
  ]},
  { ja:'お風呂に入る', icon:'🛁', forms:[
    { tense:'現在形', color:'#4ade80', ja:'私はお風呂に入ります。', en:'I take a bath.' },
    { tense:'過去形', color:'#60a5fa', ja:'私はお風呂に入りました。', en:'I took a bath.' },
    { tense:'未来形', color:'#fbbf24', ja:'私はお風呂に入る予定です。', en:'I will take a bath.' },
    { tense:'否定形', color:'#f87171', ja:'私はお風呂に入りません。', en:"I don't take a bath." },
    { tense:'疑問形', color:'#c084fc', ja:'あなたはお風呂に入りますか？', en:'Do you take a bath?' },
  ]},
];

let verbIdx=0, formIdx=0, totalDone=0, isRevealed=false, correctCount=0;
const totalCards = verbs.length * 5;
let audioCtx=null, bgmPlaying=false, bgmNodes=[], melodyTimerId=null;

// スプラッシュ
function spFlip() {
  document.getElementById('spP1').classList.remove('on');
  document.getElementById('spP2').classList.add('on');
}
function spStart() {
  const s = document.getElementById('splash');
  s.style.transition = 'opacity 0.5s';
  s.style.opacity = '0';
  setTimeout(() => s.style.display='none', 500);
}

// Audio
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function startBgm() {
  try {
    const ctx = getCtx();
    if (bgmPlaying) return;
    const master = ctx.createGain();
    master.gain.value = 1;
    master.connect(ctx.destination);
    bgmNodes = [master];
    const bpm=65, b=60/bpm;
    const melody=[262,294,330,349,392,349,330,294,262,262,294,330,262,294,349,330];
    const durs=[0.25,0.25,0.25,0.25,0.5,0.25,0.25,0.25,0.5,0.25,0.25,0.25,0.5,0.25,0.25,0.5];
    const bass=[131,131,165,131,131,165,131,165];
    const loopLen = durs.reduce((a,c)=>a+c,0)*b*2;
    function playLoop() {
      if (!bgmPlaying) return;
      const now = ctx.currentTime;
      let offset=0;
      melody.forEach((freq,i)=>{
        const dur=durs[i]*b*2;
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.type='square'; osc.frequency.value=freq;
        g.gain.setValueAtTime(0,now+offset);
        g.gain.linearRampToValueAtTime(0.035,now+offset+0.01);
        g.gain.setValueAtTime(0.035,now+offset+dur-0.04);
        g.gain.linearRampToValueAtTime(0,now+offset+dur);
        osc.connect(g); g.connect(master);
        osc.start(now+offset); osc.stop(now+offset+dur+0.05);
        offset+=dur;
      });
      let bt=now;
      bass.forEach(freq=>{
        const dur=b, osc=ctx.createOscillator(), g=ctx.createGain();
        osc.type='triangle'; osc.frequency.value=freq;
        g.gain.setValueAtTime(0.04,bt);
        g.gain.exponentialRampToValueAtTime(0.001,bt+dur*0.85);
        osc.connect(g); g.connect(master);
        osc.start(bt); osc.stop(bt+dur+0.05);
        bt+=dur*2;
      });
      melodyTimerId = setTimeout(playLoop,(loopLen-0.1)*1000);
    }
    bgmPlaying=true;
    playLoop();
    document.getElementById('bgmBtn').textContent='🧠 脳活性化BGM ON';
    document.getElementById('bgmBtn').classList.add('on');
  } catch(e) {}
}

function stopBgm() {
  bgmPlaying=false;
  if (melodyTimerId) { clearTimeout(melodyTimerId); melodyTimerId=null; }
  if (bgmNodes.length>0) {
    try { bgmNodes[0].gain.cancelScheduledValues(0); bgmNodes[0].gain.setValueAtTime(0,0); } catch(e) {}
  }
  bgmNodes=[];
  document.getElementById('bgmBtn').textContent='🧠 脳活性化BGMを流す';
  document.getElementById('bgmBtn').classList.remove('on');
}
function toggleBgm() { bgmPlaying ? stopBgm() : startBgm(); }

function playTapSound(col) {
  try {
    const ctx=getCtx();
    const freqs={'#4ade80':523,'#60a5fa':440,'#fbbf24':587,'#f87171':392,'#c084fc':659};
    const freq=freqs[col]||523;
    const osc=ctx.createOscillator(), g=ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type='sine'; osc.frequency.setValueAtTime(freq,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*1.4,ctx.currentTime+0.08);
    g.gain.setValueAtTime(0.1,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.22);
    osc.start(); osc.stop(ctx.currentTime+0.22);
  } catch(e) {}
}

function playNextSound() {
  try {
    const ctx=getCtx();
    [440,550,660].forEach((f,i)=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value=f;
      const t=ctx.currentTime+i*0.07;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.07,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
      osc.start(t); osc.stop(t+0.18);
    });
  } catch(e) {}
}

function playCompleteSound() {
  try {
    const ctx=getCtx();
    [523,659,784,1047].forEach((f,i)=>{
      const osc=ctx.createOscillator(), g=ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.frequency.value=f;
      const t=ctx.currentTime+i*0.13;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.09,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      osc.start(t); osc.stop(t+0.4);
    });
  } catch(e) {}
}

function render() {
  const verb=verbs[verbIdx], form=verb.forms[formIdx], col=form.color;
  document.getElementById('verbIcon').textContent=verb.icon;
  document.getElementById('verbIcon').style.background=col+'18';
  document.getElementById('verbIcon').style.borderColor=col+'40';
  document.getElementById('verbName').textContent=verb.ja;
  document.getElementById('verbCounter').textContent=`動詞 ${verbIdx+1}/10`;
  const dots=document.getElementById('stepDots');
  dots.innerHTML='';
  verb.forms.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='step-dot'+(i===formIdx?' active':i<formIdx?' done':'');
    d.style.background=i===formIdx?col:i<formIdx?col+'60':'rgba(255,255,255,0.12)';
    dots.appendChild(d);
  });
  const pct=totalDone/totalCards*100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressFill').style.background=col;
  document.getElementById('progressText').textContent=`${totalDone+1} / ${totalCards}`;
  isRevealed=false;
  const card=document.getElementById('mainCard');
  card.style.borderColor='rgba(255,255,255,0.12)';
  card.style.boxShadow='none';
  card.classList.remove('entering');
  void card.offsetWidth;
  card.classList.add('entering');
  const tag=document.getElementById('tenseTag');
  tag.textContent=form.tense; tag.style.color=col; tag.style.borderColor=col+'80';
  document.getElementById('cardJa').textContent=form.ja;
  document.getElementById('cardEn').textContent=form.en;
  document.getElementById('cardEn').style.color=col;
  document.getElementById('cardEn').style.display='none';
  document.getElementById('tapHint').style.display='block';
  document.getElementById('speakRow').style.display='none';
  const btn=document.getElementById('btnNext');
  btn.disabled=true; btn.classList.remove('ready');
  btn.style.background='rgba(255,255,255,0.07)';
  btn.style.color='rgba(255,255,255,0.25)';
  const isLast=formIdx===4&&verbIdx===verbs.length-1;
  btn.textContent=isLast?'完了 ✓':formIdx===4?'次の動詞へ →':'次へ →';
}

function revealCard() {
  if (isRevealed) return;
  isRevealed=true; correctCount++;
  const form=verbs[verbIdx].forms[formIdx], col=form.color;
  playTapSound(col);
  document.getElementById('cardEn').style.display='block';
  document.getElementById('tapHint').style.display='none';
  document.getElementById('speakRow').style.display='flex';
  const card=document.getElementById('mainCard');
  card.classList.add('revealed');
  card.style.borderColor=col+'70';
  card.style.boxShadow=`0 0 30px ${col}20`;
  const btn=document.getElementById('btnNext');
  btn.disabled=false; btn.classList.add('ready');
  btn.style.background=col; btn.style.color='#000';
  setTimeout(()=>speakEn(),300);
  spawnEffect(window.innerWidth/2,380,col);
}

function nextCard() {
  if (!isRevealed) return;
  playNextSound(); totalDone++;
  formIdx<4 ? formIdx++ : (formIdx=0, verbIdx++);
  if (verbIdx>=verbs.length) { showComplete(); return; }
  render();
}

function showComplete() {
  document.getElementById('mainCard').style.display='none';
  document.getElementById('btnNext').style.display='none';
  document.getElementById('bgmBtn').style.display='none';
  document.getElementById('completeScreen').classList.add('show');
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressText').textContent=`${totalCards} / ${totalCards}`;
  const rate=correctCount/totalCards;
  document.getElementById('completeIcon').textContent=rate>=0.9?'🏆':'🔄';
  document.getElementById('completeTitle').textContent=rate>=0.9?'次のステップへ！':'もう一度挑戦！';
  document.getElementById('completeMsg').innerHTML=rate>=0.9
    ?'素晴らしい！<br>次のステップに進んでください。'
    :'もう少しです。<br>10回繰り返すことで身につきます。';
  playCompleteSound();
}

function restart() {
  verbIdx=0; formIdx=0; totalDone=0; correctCount=0;
  document.getElementById('mainCard').style.display='flex';
  document.getElementById('btnNext').style.display='block';
  document.getElementById('bgmBtn').style.display='block';
  document.getElementById('completeScreen').classList.remove('show');
  render();
}

function speakEn() {
  const form=verbs[verbIdx].forms[formIdx];
  if (!('speechSynthesis' in window)) return;
  const btn=document.getElementById('speakBtn');
  try {
    window.speechSynthesis.cancel();
    const text=form.pronunciation||form.en;
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.88;
    btn.classList.add('playing'); btn.disabled=true;
    u.onend=()=>{btn.classList.remove('playing');btn.disabled=false;};
    u.onerror=()=>{btn.classList.remove('playing');btn.disabled=false;};
    window.speechSynthesis.speak(u);
  } catch(e) {}
}

function spawnEffect(x,y,col) {
  const core=document.createElement('div');
  core.style.cssText=`position:fixed;left:${x-18}px;top:${y-18}px;width:36px;height:36px;border-radius:50%;background:radial-gradient(circle,${col}cc,transparent 70%);pointer-events:none;z-index:999;animation:burst 0.45s ease-out forwards;`;
  document.body.appendChild(core); setTimeout(()=>core.remove(),450);
  const ring=document.createElement('div');
  ring.style.cssText=`position:fixed;left:${x-24}px;top:${y-24}px;width:48px;height:48px;border-radius:50%;border:2px solid ${col}80;pointer-events:none;z-index:998;animation:ring 0.5s ease-out forwards;`;
  document.body.appendChild(ring); setTimeout(()=>ring.remove(),500);
}

render();
</script>
</body>
</html>
